[build]
  publish = "."

[dev]
  publish = "."
  port = 8888
  framework = "#static"
  autoLaunch = false

# CDN de imagens (aceita qualquer URL externa)
[images]
  remote_images = ["https://.*"]

# Home na raiz do site
[[redirects]]
  from = "/"
  to = "/home/index.html"
  status = 200
  force = true

# Rebranding: o clube "Clube do Leilão" virou "Leilão & Prosa" (jul/2026).
# Sem force de propósito: o diretório antigo não existe mais, então não há
# arquivo para o redirect competir. Manter enquanto houver links antigos
# circulando em anúncios, e-mails e no grupo do WhatsApp.
[[redirects]]
  from = "/clube-do-leilao/*"
  to = "/leilao-e-prosa/:splat"
  status = 301

# Redirect www → apex (leilãoeprosa.com em punycode)
[[redirects]]
  from = "https://www.xn--leiloeprosa-c8a.com/*"
  to = "https://xn--leiloeprosa-c8a.com/:splat"
  status = 301
  force = true

# Headers de seguranca
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache para assets estaticos
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
